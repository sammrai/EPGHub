server {
  listen 80 default_server;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Resolve the upstream at request time via Docker's embedded DNS so that
  # nginx doesn't crash on boot if `server` is still starting, and so it
  # picks up a new IP after the server container restarts. The variable
  # indirection (`set $upstream ...`) is what forces this runtime lookup.
  resolver 127.0.0.11 valid=10s ipv6=off;

  # /api/* → server:3000. Trailing slash on proxy_pass strips the /api
  # prefix so the server sees its own routes (e.g. /api/channels → /channels),
  # mirroring the Vite dev proxy in app/vite.config.ts.
  location /api/ {
    set $upstream http://server:3000;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass $upstream;
  }

  # SPA fallback — react-router owns client-side routes.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
