# Host-machine Postgres for epghub. Use when not running inside the devcontainer.
# Inside the devcontainer, Postgres is installed directly (see server/README).
#
# Usage (host):
#   docker compose up -d
#   cd server && cp .env.example .env && npm install
#   npm run db:migrate
#   npm run dev
services:
  postgres:
    image: postgres:15-alpine
    container_name: epghub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: epghub
      POSTGRES_PASSWORD: epghub
      POSTGRES_DB: epghub
    ports:
      - "5432:5432"
    volumes:
      - epghub-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U epghub -d epghub"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  epghub-pg-data:
