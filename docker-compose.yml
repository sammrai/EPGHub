# End-to-end stack for epghub. `docker compose up -d` pulls the images
# published by .github/workflows/build-push.yml; if an image isn't available
# locally and pulls fail, `docker compose build` rebuilds from source using
# the Dockerfiles under server/ and app/.
#
# Overridable via env or a local .env file:
#   EPGHUB_TAG        — image tag to pull (default: latest)
#   EPGHUB_IMAGE_OWNER— GHCR owner/namespace (default: sammrai)
#   MIRAKURUN_URL     — live tuner endpoint (optional; fixtures drive when unset)
#   TVDB_API_KEY      — TheTVDB v4 key (optional)
name: epghub

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: epghub
      POSTGRES_PASSWORD: epghub
      POSTGRES_DB: epghub
    ports:
      - "5432:5432"
    volumes:
      - epghub-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U epghub -d epghub"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    image: ghcr.io/${EPGHUB_IMAGE_OWNER:-sammrai}/epghub-server:${EPGHUB_TAG:-latest}
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://epghub:epghub@postgres:5432/epghub
      PORT: "3000"
      RECORDING_DIR: /var/lib/epghub/recordings
      TVDB_CACHE_DIR: /var/lib/epghub/tvdb-cache
      MIRAKURUN_URL: ${MIRAKURUN_URL:-}
      TVDB_API_KEY: ${TVDB_API_KEY:-}
    volumes:
      - epghub-recordings:/var/lib/epghub/recordings
      - epghub-tvdb-cache:/var/lib/epghub/tvdb-cache
    ports:
      # EPGStation の 2 番目のポート (8889) + 1. 直接 API を叩きたい場合向け。
      # UI・Swagger UI は app (8889) 経由でも届くので普段は参照しなくて良い。
      - "8890:3000"

  app:
    image: ghcr.io/${EPGHUB_IMAGE_OWNER:-sammrai}/epghub-app:${EPGHUB_TAG:-latest}
    build:
      context: .
      dockerfile: app/Dockerfile
    restart: unless-stopped
    depends_on:
      - server
    ports:
      # EPGStation の UI ポート (8888) + 1. UI, /api/*, /docs, /openapi.* を
      # すべてこのポートで受ける (nginx が server:3000 に proxy する)。
      - "8889:80"

volumes:
  epghub-pg-data:
  epghub-recordings:
  epghub-tvdb-cache:
