# End-to-end stack for epghub. `docker compose up -d` pulls the images
# published by .github/workflows/build-push.yml; if an image isn't available
# locally and pulls fail, `docker compose build` rebuilds from source using
# the Dockerfiles under server/ and app/.
#
# Overridable via env or a local .env file:
#   EPGHUB_TAG        — image tag to pull (default: latest)
#   EPGHUB_IMAGE_OWNER— GHCR owner/namespace (default: sammrai)
#   MIRAKURUN_URL     — live tuner endpoint (optional; fixtures drive when unset)
#   TVDB_API_KEY      — TheTVDB v4 key (optional)
name: epghub

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: epghub
      POSTGRES_PASSWORD: epghub
      POSTGRES_DB: epghub
    # Reachable only through the compose-internal network (hostname `postgres`).
    # Use `docker compose exec postgres psql -U epghub` for admin access.
    volumes:
      - epghub-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U epghub -d epghub"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    image: ghcr.io/${EPGHUB_IMAGE_OWNER:-sammrai}/epghub-server:${EPGHUB_TAG:-latest}
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://epghub:epghub@postgres:5432/epghub
      PORT: "3000"
      RECORDING_DIR: /var/lib/epghub/recordings
      TVDB_CACHE_DIR: /var/lib/epghub/tvdb-cache
      MIRAKURUN_URL: ${MIRAKURUN_URL:-}
      TVDB_API_KEY: ${TVDB_API_KEY:-}
      # Deployed stacks start empty by default. Flip to `on` (or unset it
      # here and keep MIRAKURUN_URL empty) to revive the sample channels /
      # programs / rules used by the dev UX.
      EPGHUB_FIXTURES: ${EPGHUB_FIXTURES:-off}
    volumes:
      - epghub-recordings:/var/lib/epghub/recordings
      - epghub-tvdb-cache:/var/lib/epghub/tvdb-cache
    # No host port — the browser reaches the server through app (/api/*,
    # /docs, /openapi.json). Use `docker compose exec server sh` for shell
    # access if you need to curl from inside the network.

  app:
    image: ghcr.io/${EPGHUB_IMAGE_OWNER:-sammrai}/epghub-app:${EPGHUB_TAG:-latest}
    build:
      context: .
      dockerfile: app/Dockerfile
    restart: unless-stopped
    depends_on:
      - server
    ports:
      # Single host-facing port. UI, /api/*, /docs, /openapi.json all land
      # here; nginx proxies server-side routes to server:3000 on the compose
      # network. Follows EPGStation's single-port UX.
      - "8890:80"

volumes:
  epghub-pg-data:
  epghub-recordings:
  epghub-tvdb-cache:
